name: Tourism Project Pipeline

on:
  push:
    branches:
      - main  # Automatically triggers on push to the main branch

jobs:

  data-prep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Show repository files
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== tourism_project directory ==="
          ls -la tourism_project || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          if [ -f tourism_project/requirements-github.txt ]; then
            echo "Using tourism_project/requirements-github.txt"
            pip install -r tourism_project/requirements-github.txt
          elif [ -f tourism_project/requirements.txt ]; then
            echo "Using tourism_project/requirements.txt"
            pip install -r tourism_project/requirements.txt
          elif [ -f requirements.txt ]; then
            echo "Using top-level requirements.txt"
            pip install -r requirements.txt
          else
            echo "No requirements file found under tourism_project or repo root."
            ls -la tourism_project || true
            exit 1
          fi

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: nareshpaib/tourism_dataset # Replace with your actual dataset repo
        run: |
          if [ -f tourism_project/scripts/data_prep.py ]; then
            python tourism_project/scripts/data_prep.py
          else
            echo "ERROR: tourism_project/scripts/data_prep.py not found"
            ls -la tourism_project || true
            exit 1
          fi

  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Show repository files
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== tourism_project directory ==="
          ls -la tourism_project || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          if [ -f tourism_project/requirements-github.txt ]; then
            echo "Using tourism_project/requirements-github.txt"
            pip install -r tourism_project/requirements-github.txt
          elif [ -f tourism_project/requirements.txt ]; then
            echo "Using tourism_project/requirements.txt"
            pip install -r tourism_project/requirements.txt
          elif [ -f requirements.txt ]; then
            echo "Using top-level requirements.txt"
            pip install -r requirements.txt
          else
            echo "No requirements file found under tourism_project or repo root."
            ls -la tourism_project || true
            exit 1
          fi

      - name: Run Model Training
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: nareshpaib/tourism_dataset # Replace with your actual dataset repo
          HF_MODEL_REPO: nareshpaib/tourism_prediction_decision_tree_model # Replace with your actual model repo
        run: |
          if [ -f tourism_project/scripts/model_training.py ]; then
            python tourism_project/scripts/model_training.py
          else
            echo "ERROR: tourism_project/scripts/model_training.py not found"
            ls -la tourism_project || true
            exit 1
          fi

  deploy-hosting:
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Show repository files
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== tourism_project directory ==="
          ls -la tourism_project || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          if [ -f tourism_project/requirements-github.txt ]; then
            echo "Using tourism_project/requirements-github.txt"
            pip install -r tourism_project/requirements-github.txt
          elif [ -f tourism_project/requirements.txt ]; then
            echo "Using tourism_project/requirements.txt"
            pip install -r tourism_project/requirements.txt
          elif [ -f requirements.txt ]; then
            echo "Using top-level requirements.txt"
            pip install -r requirements.txt
          else
            echo "No requirements file found under tourism_project or repo root."
            ls -la tourism_project || true
            exit 1
          fi

      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: nareshpaib/tourism_prediction_app # Replace with your actual space repo
        run: |
          if [ -f tourism_project/scripts/deploy_hosting.py ]; then
            python tourism_project/scripts/deploy_hosting.py
          else
            echo "ERROR: tourism_project/scripts/deploy_hosting.py not found"
            ls -la tourism_project || true
            exit 1
          fi
